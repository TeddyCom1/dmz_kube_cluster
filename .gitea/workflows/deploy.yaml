name: DMZ Kube Cluster Deploy
run-name: ${{ gitea.actor }} deploying DMZ cluster
on: [workflow_dispatch]

jobs:
  Terraform-Deploy:
    runs-on: ubuntu-latest
    env:
      TF_HTTP_USERNAME: "ci-bot"
      TF_HTTP_PASSWORD: ${{ secrets.CI_BOT_TOKEN }}
      PM_API_TOKEN_ID: ${{ secrets.PM_API_TOKEN_ID }}
      PM_API_TOKEN_SECRET: ${{ secrets.PM_API_TOKEN_SECRET }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -var-file=vars/prod.tfvars

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan 2>&1
